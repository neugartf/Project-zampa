{% extends "base.html" %}

{% block content %}

<h2>Register User & Dog</h2>

<form method="POST">

    <h3>User Info</h3>
    <label>Username:</label><br>
    <input type="text" name="username" required><br><br>

    <label>Email:</label><br>
    <input type="email" name="email" required><br><br>

    <label>Neighborhood:</label><br>
    <select name="neighborhood">
    <option>Poblenou</option>
    <option>Gracia</option>
    <option>Eixample</option>
    <option>Raval</option>
    <option>El Born</option>
    <option>Barceloneta</option>
    <option>Sants</option>
    <option>Clot</option>
    <option>Gothic</option>
    </select>

    <h3>Dog Info</h3>
    <label>Dog Name:</label><br>
    <input type="text" name="dog_name" required><br><br>

    <label>Breed:</label><br>
    <input type="text" name="dog_breed" required><br><br>

    <button type="submit">Register</button>

</form>

{% endblock %}
